name: Deploy To VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS To Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Repository To VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.secrets' \
            --exclude 'product-web/node_modules' \
            --exclude 'product-web/dist' \
            --exclude 'product-api/target' \
            --exclude 'product-api/.env' \
            --exclude 'product-api/docker-compose.runtime.yml' \
            ./ "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.DEPLOY_DIR }}/"

      - name: Deploy API And Web
        run: |
          ssh "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" "DEPLOY_DIR='${{ vars.DEPLOY_DIR }}' FQDN='${{ vars.FQDN }}' bash -s" <<'REMOTE'
          set -euo pipefail

          API_PORT=18081
          SHARED_COMPOSE_FILE="/opt/docker-compose.yml"
          LEGACY_STACK_FILE="$DEPLOY_DIR/product-api/docker-compose.runtime.yml"

          if [ ! -f "$SHARED_COMPOSE_FILE" ]; then
            echo "Shared compose file not found: ${SHARED_COMPOSE_FILE}"
            exit 1
          fi

          if [ -f "$LEGACY_STACK_FILE" ]; then
            docker compose -p starostina_leanedu -f "$LEGACY_STACK_FILE" down --remove-orphans || true
          fi

          docker compose -p opt -f "$SHARED_COMPOSE_FILE" build starostina-api
          docker compose -p opt -f "$SHARED_COMPOSE_FILE" up -d --no-deps starostina-api

          api_ready=0
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/actuator/health" >/dev/null 2>&1; then
              api_ready=1
              break
            fi
            sleep 2
          done
          if [ "$api_ready" -ne 1 ]; then
            echo "API healthcheck failed on port ${API_PORT}"
            exit 1
          fi

          cd "$DEPLOY_DIR/product-web"
          docker run --rm -v "$PWD":/app -w /app \
            -e VITE_API_URL="https://${FQDN}" \
            node:22 bash -lc "npm install && npm run build"

          mkdir -p "/var/www/projects/${FQDN}"
          rsync -av --delete dist/ "/var/www/projects/${FQDN}/"

          nginx -t
          systemctl reload nginx

          web_ready=0
          for i in $(seq 1 30); do
            if curl -fsS "https://${FQDN}/" >/dev/null 2>&1; then
              web_ready=1
              break
            fi
            sleep 2
          done
          if [ "$web_ready" -ne 1 ]; then
            echo "Web smoke check failed: https://${FQDN}/"
            exit 1
          fi

          docs_ready=0
          for i in $(seq 1 30); do
            if curl -fsS "https://${FQDN}/v3/api-docs" >/dev/null 2>&1; then
              docs_ready=1
              break
            fi
            sleep 2
          done
          if [ "$docs_ready" -ne 1 ]; then
            echo "API docs smoke check failed: https://${FQDN}/v3/api-docs"
            exit 1
          fi
          REMOTE
