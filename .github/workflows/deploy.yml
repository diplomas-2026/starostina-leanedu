name: Deploy To VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS To Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Repository To VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.secrets' \
            --exclude 'product-web/node_modules' \
            --exclude 'product-web/dist' \
            --exclude 'product-api/target' \
            --exclude 'product-api/.env' \
            --exclude 'product-api/docker-compose.runtime.yml' \
            ./ "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.DEPLOY_DIR }}/"

      - name: Deploy API And Web
        run: |
          ssh "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" "DEPLOY_DIR='${{ vars.DEPLOY_DIR }}' FQDN='${{ vars.FQDN }}' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR/product-api"

          if [ ! -f .env ]; then
            JWT_SECRET=$(openssl rand -base64 48 | tr -d '\n')
            printf '%s\n' \
              "DB_URL=jdbc:postgresql://postgres:5432/product_db" \
              "DB_USER=product" \
              "DB_PASSWORD=product" \
              "APP_JWT_SECRET=${JWT_SECRET}" \
              "GIGACHAT_API_KEY=demo-key" \
              "GIGACHAT_BASE_URL=https://gigachat.devices.sberbank.ru/api/v1" \
              "GIGACHAT_MODEL=GigaChat" > .env
          fi

          API_PORT=18081
          echo "Using fixed API port: ${API_PORT}"

          PORT_HOLDER=$(docker ps -q --filter "publish=${API_PORT}" | head -n 1 || true)
          if [ -n "${PORT_HOLDER}" ]; then
            HOLDER_PROJECT=$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project" }}' "${PORT_HOLDER}" 2>/dev/null || true)
            if [ "${HOLDER_PROJECT}" = "starostina_leanedu" ]; then
              echo "Port ${API_PORT} is occupied by existing project container ${PORT_HOLDER}, removing it"
              docker rm -f "${PORT_HOLDER}"
            else
              echo "Port ${API_PORT} is occupied by foreign container ${PORT_HOLDER} (project=${HOLDER_PROJECT:-unknown})."
              echo "Refusing to change port automatically to avoid nginx mismatch."
              exit 1
            fi
          fi

          printf '%s\n' \
            "services:" \
            "  postgres:" \
            "    image: postgres:16" \
            "    environment:" \
            "      POSTGRES_DB: product_db" \
            "      POSTGRES_USER: product" \
            "      POSTGRES_PASSWORD: product" \
            "    ports:" \
            "      - \"127.0.0.1:15436:5432\"" \
            "    healthcheck:" \
            "      test: [\"CMD-SHELL\", \"pg_isready -U product -d product_db\"]" \
            "      interval: 5s" \
            "      timeout: 3s" \
            "      retries: 20" \
            "" \
            "  api:" \
            "    build:" \
            "      context: ." \
            "    depends_on:" \
            "      postgres:" \
            "        condition: service_healthy" \
            "    env_file:" \
            "      - .env" \
            "    ports:" \
            "      - \"127.0.0.1:${API_PORT}:8080\"" > docker-compose.runtime.yml

          docker compose -p starostina_leanedu -f docker-compose.runtime.yml up -d --build

          NGINX_SITE="/etc/nginx/sites-enabled/${FQDN}"
          if [ ! -f "$NGINX_SITE" ]; then
            echo "Nginx config not found: ${NGINX_SITE}"
            exit 1
          fi
          if ! grep -q "127.0.0.1:${API_PORT}" "$NGINX_SITE"; then
            echo "Nginx config does not point to expected API port ${API_PORT}"
            exit 1
          fi

          api_ready=0
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/actuator/health" >/dev/null 2>&1; then
              api_ready=1
              break
            fi
            sleep 2
          done
          if [ "$api_ready" -ne 1 ]; then
            echo "API healthcheck failed on port ${API_PORT}"
            exit 1
          fi

          cd "$DEPLOY_DIR/product-web"
          docker run --rm -v "$PWD":/app -w /app \
            -e VITE_API_URL="https://${FQDN}" \
            node:22 bash -lc "npm install && npm run build"

          mkdir -p "/var/www/projects/${FQDN}"
          rsync -av --delete dist/ "/var/www/projects/${FQDN}/"

          nginx -t
          systemctl reload nginx

          web_ready=0
          for i in $(seq 1 30); do
            if curl -fsS "https://${FQDN}/" >/dev/null 2>&1; then
              web_ready=1
              break
            fi
            sleep 2
          done
          if [ "$web_ready" -ne 1 ]; then
            echo "Web smoke check failed: https://${FQDN}/"
            exit 1
          fi

          docs_ready=0
          for i in $(seq 1 30); do
            if curl -fsS "https://${FQDN}/v3/api-docs" >/dev/null 2>&1; then
              docs_ready=1
              break
            fi
            sleep 2
          done
          if [ "$docs_ready" -ne 1 ]; then
            echo "API docs smoke check failed: https://${FQDN}/v3/api-docs"
            exit 1
          fi
          REMOTE
