spring.application.name=product-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/product_db}
spring.datasource.username=${DB_USER:product}
spring.datasource.password=${DB_PASSWORD:product}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

springdoc.swagger-ui.path=/swagger-ui

app.jwt.secret=${APP_JWT_SECRET:U2VjcmV0S2V5U2VjcmV0S2V5U2VjcmV0S2V5U2VjcmV0S2V5MTIzNDU2Nzg=}
app.jwt.expiration-minutes=720

app.ai.daily-limit=10000
app.ai.timezone=Europe/Samara
app.ai.model=${GIGACHAT_MODEL:GigaChat}

spring.ai.openai.base-url=${GIGACHAT_BASE_URL:https://gigachat.devices.sberbank.ru/api/v1}
spring.ai.openai.api-key=${GIGACHAT_API_KEY:demo-key}
spring.ai.openai.chat.options.model=${GIGACHAT_MODEL:GigaChat}
spring.ai.openai.chat.options.temperature=0.2
